name: Build Adblock Lists

on:
  push:
    paths:
      - "list.md"
  schedule:
    - cron: "44 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y curl gawk

      - name: Get current date
        id: date
        run: |
          echo "display=$(date +'%Y-%m-%d %H:%M')" >> "$GITHUB_OUTPUT"

      - name: Parse list.md, compile and generate compatibility outputs
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p lists
          workdir="$(mktemp -d)"
          trap 'rm -rf "$workdir"' EXIT

          block_src="$workdir/block_sources.txt"
          allow_src="$workdir/allow_sources.txt"
          block_raw="$workdir/block_raw.txt"
          allow_raw="$workdir/allow_raw.txt"

          # 1. FORZA LA CREAZIONE DI TUTTI I FILE (Risolve l'errore "No such file or directory")
          touch "$block_src" "$allow_src" "$block_raw" "$allow_raw"

          # 2. Usa -v per passare le variabili ad awk in modo sicuro
          if [ -f "list.md" ]; then
            awk -v bsrc="$block_src" -v asrc="$allow_src" '
              BEGIN{mode=""}
              /^[[:space:]]*blocklist:[[:space:]]*$/ {mode="block"; next}
              /^[[:space:]]*allowlist:[[:space:]]*$/ {mode="allow"; next}
              mode=="block" && /\[x\]/ { sub(/^.*\[x\][[:space:]]*/, "", $0); sub(/[[:space:]]+$/, "", $0); print >> bsrc }
              mode=="allow" && /\[x\]/ { sub(/^.*\[x\][[:space:]]*/, "", $0); sub(/[[:space:]]+$/, "", $0); print >> asrc }
            ' list.md
          fi

          while IFS= read -r line || [ -n "$line" ]; do
            [ -z "$line" ] && continue
            if [[ "$line" == list:* ]]; then
              url="${line#list:}"
              curl -fsSL --connect-timeout 15 --retry 3 "$url" >> "$block_raw" || echo "! failed to download $url" >> "$block_raw"
              printf '\n' >> "$block_raw"
            else
              echo "$line" >> "$block_raw"
            fi
          done < "$block_src"

          while IFS= read -r line || [ -n "$line" ]; do
            [ -z "$line" ] && continue
            if [[ "$line" == list:* ]]; then
              url="${line#list:}"
              curl -fsSL --connect-timeout 15 --retry 3 "$url" >> "$allow_raw" || echo "! failed to download $url" >> "$allow_raw"
              printf '\n' >> "$allow_raw"
            else
              echo "$line" >> "$allow_raw"
            fi
          done < "$allow_src"

          export WORKDIR="$workdir"

          python3 <<'PY'
          import re
          import os
          from pathlib import Path
          from collections import OrderedDict

          base = Path(os.environ["WORKDIR"])
          block_raw = (base / "block_raw.txt").read_text(encoding="utf-8", errors="ignore").splitlines()
          allow_raw = (base / "allow_raw.txt").read_text(encoding="utf-8", errors="ignore").splitlines()

          domain_re = re.compile(r'^(?:[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?\.)+[a-z]{2,}$', re.I)
          hosts_re = re.compile(r'^(0\.0\.0\.0|127\.0\.0\.1|::1)\s+([A-Za-z0-9._-]+)(?:\s+#.*)?$')
          comment_re = re.compile(r'^\s*[!#]')
          adblock_exception_re = re.compile(r'^@@')
          cosmetic_markers = ('##', '#@#', '#$#', '#%#', '#?#')
          likely_network_markers = ('||', '|http', '|https', '$', '*', '/', '^')
          dns_modifiers = ('dnstype=', 'dnsrewrite=', 'client=', 'ctag=', 'denyallow=')

          def clean(line):
              line = line.replace('\r', '').strip()
              return line

          def is_comment(line):
              return not line or comment_re.match(line)

          def strip_inline_comment_domain(line):
              line = line.split('#', 1)[0].strip()
              return line

          def canonical_domain(domain):
              d = domain.strip().strip('.').lower()
              return d if domain_re.match(d) else None

          def classify(line):
              raw = clean(line)
              if is_comment(raw):
                  return None

              m = hosts_re.match(raw)
              if m:
                  dom = canonical_domain(m.group(2))
                  if dom:
                      return ("domain_block", dom, raw)

              maybe_domain = canonical_domain(strip_inline_comment_domain(raw))
              if maybe_domain:
                  if raw.startswith('@@'):
                      return ("domain_exception", maybe_domain, raw)
                  return ("domain_block", maybe_domain, raw)

              if any(marker in raw for marker in cosmetic_markers):
                  return ("cosmetic", raw, raw)

              if adblock_exception_re.match(raw):
                  return ("exception_rule", raw, raw)

              if any(dm in raw for dm in dns_modifiers):
                  return ("dns_rule", raw, raw)

              if raw.startswith('/'):
                  return ("network_rule", raw, raw)

              if any(tok in raw for tok in likely_network_markers):
                  return ("network_rule", raw, raw)

              return ("opaque_rule", raw, raw)

          def add_unique(store, key, value):
              if key not in store:
                  store[key] = value

          block_domains = OrderedDict()
          allow_domains = OrderedDict()
          browser_rules = OrderedDict()
          dns_rules = OrderedDict()
          cosmetic_rules = OrderedDict()
          opaque_rules = OrderedDict()

          for line in block_raw:
              item = classify(line)
              if not item:
                  continue
              kind, key, raw = item
              if kind == "domain_block":
                  add_unique(block_domains, key, key)
              elif kind == "network_rule":
                  add_unique(browser_rules, raw, raw)
              elif kind == "dns_rule":
                  add_unique(browser_rules, raw, raw)
                  add_unique(dns_rules, raw, raw)
              elif kind == "cosmetic":
                  add_unique(cosmetic_rules, raw, raw)
                  add_unique(browser_rules, raw, raw)
              elif kind == "opaque_rule":
                  add_unique(browser_rules, raw, raw)
                  add_unique(opaque_rules, raw, raw)
              elif kind == "exception_rule":
                  add_unique(browser_rules, raw, raw)

          for line in allow_raw:
              item = classify(line)
              if not item:
                  continue
              kind, key, raw = item
              if kind == "domain_exception":
                  add_unique(allow_domains, key, key)
              elif kind == "domain_block":
                  add_unique(allow_domains, key, key)
              elif kind == "exception_rule":
                  add_unique(browser_rules, raw, raw)
                  if any(dm in raw for dm in dns_modifiers) or raw.startswith('@@||') or raw.startswith('@@/'):
                      add_unique(dns_rules, raw, raw)
              elif kind == "cosmetic":
                  add_unique(browser_rules, raw, raw)
              else:
                  if not raw.startswith('@@'):
                      raw = '@@' + raw
                  add_unique(browser_rules, raw, raw)

          for dom in block_domains:
              add_unique(browser_rules, f"||{dom}^", f"||{dom}^")
              add_unique(dns_rules, f"||{dom}^", f"||{dom}^")

          for dom in allow_domains:
              add_unique(browser_rules, f"@@||{dom}^", f"@@||{dom}^")
              add_unique(dns_rules, f"@@||{dom}^", f"@@||{dom}^")

          def hosts_output():
              out = OrderedDict()
              for dom in block_domains:
                  if dom not in allow_domains:
                      out[f"0.0.0.0 {dom}"] = None
              return list(out.keys())

          def domains_output():
              out = OrderedDict()
              for dom in block_domains:
                  if dom not in allow_domains:
                      out[dom] = None
              return list(out.keys())

          def dns_adblock_output():
              out = OrderedDict()
              for rule in dns_rules.values():
                  if any(marker in rule for marker in cosmetic_markers):
                      continue
                  out[rule] = None
              return list(out.keys())

          def browser_output():
              out = OrderedDict()
              for rule in browser_rules.values():
                  out[rule] = None
              return list(out.keys())

          browser_list = browser_output()
          dns_list = dns_adblock_output()
          hosts_list = hosts_output()
          domains_list = domains_output()

          header = [
              "! Title: Combined custom list",
              "! Generated automatically",
          ]

          Path("lists/combined_ublock.txt").write_text(
              "\n".join(header + [""] + browser_list) + "\n",
              encoding="utf-8"
          )

          Path("lists/combined_adguard.txt").write_text(
              "\n".join(header + [""] + browser_list) + "\n",
              encoding="utf-8"
          )

          Path("lists/combined_dns_adblock.txt").write_text(
              "\n".join(header + [""] + dns_list) + "\n",
              encoding="utf-8"
          )

          Path("lists/combined_hosts.txt").write_text(
              "\n".join(hosts_list) + ("\n" if hosts_list else ""),
              encoding="utf-8"
          )

          Path("lists/combined_domains.txt").write_text(
              "\n".join(domains_list) + ("\n" if domains_list else ""),
              encoding="utf-8"
          )
          PY

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add lists/*.txt
          git commit -m "Aggiornamento liste automatico: ${{ steps.date.outputs.display }}" || echo "Nessuna modifica da committare"
          git push
